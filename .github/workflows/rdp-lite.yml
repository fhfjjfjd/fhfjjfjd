name: RDP Lite

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'RDP Username'
        required: false
        default: 'RDP'

concurrency:
  group: rdp-lite
  cancel-in-progress: false

jobs:
  rdp-lite:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: System Info
        run: |
          $os = Get-CimInstance Win32_OperatingSystem
          $cpu = Get-CimInstance Win32_Processor
          $cs = Get-CimInstance Win32_ComputerSystem
          $disk = Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'"
          Write-Host "OS: $($os.Caption) | CPU: $($cpu.Name)"
          Write-Host "RAM: $([math]::Round($cs.TotalPhysicalMemory / 1GB, 1)) GB | Disk: $([math]::Round($disk.FreeSpace / 1GB, 1)) GB free"

      - name: Quick Boost
        run: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          @("DiagTrack","SysMain","WSearch") | ForEach-Object {
              Set-Service -Name $_ -StartupType Disabled -ErrorAction SilentlyContinue
              Stop-Service -Name $_ -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Performance boost applied"

      - name: Configure RDP
        run: |
          $tsPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          Set-ItemProperty -Path $tsPath -Name "fDenyTSConnections" -Value 0 -Force
          $rdpTcp = "$tsPath\WinStations\RDP-Tcp"
          @{
              "UserAuthentication" = 0; "SecurityLayer" = 0
              "MaxConnectionTime" = 0; "MaxDisconnectionTime" = 0; "MaxIdleTime" = 0
              "fDisableClip" = 0; "fDisableCdm" = 0
          }.GetEnumerator() | ForEach-Object {
              Set-ItemProperty -Path $rdpTcp -Name $_.Key -Value $_.Value -Force
          }
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 2>$null
          Restart-Service -Name TermService -Force
          Write-Host "RDP ready"

      - name: Create User
        run: |
          $username = "${{ inputs.username }}"
          $chars = @()
          $chars += [char[]](65..90)  | Get-Random -Count 4
          $chars += [char[]](97..122) | Get-Random -Count 4
          $chars += [char[]](48..57)  | Get-Random -Count 3
          $chars += [char[]](33..47)  | Get-Random -Count 2
          $password = -join ($chars | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Set-LocalUser -Name $username -Password $securePass
          } else {
              New-LocalUser -Name $username -Password $securePass -PasswordNeverExpires -AccountNeverExpires
          }
          @("Administrators", "Remote Desktop Users") | ForEach-Object {
              Add-LocalGroupMember -Group $_ -Member $username -ErrorAction SilentlyContinue
          }
          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          Write-Host "User '$username' ready"

      - name: Connect Tailscale
        run: |
          winget install --id Tailscale.Tailscale --source winget --silent --accept-package-agreements --accept-source-agreements
          for ($i = 0; $i -lt 30; $i++) {
              if (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe") { break }
              Start-Sleep -Seconds 2
          }
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-lite-${{ github.run_id }}
          $tsIP = $null
          for ($i = 0; $i -lt 20; $i++) {
              $tsIP = (& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null) | Select-Object -First 1
              if ($tsIP) { break }
              Start-Sleep -Seconds 3
          }
          if (-not $tsIP) { Write-Error "Tailscale failed"; exit 1 }
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale: $tsIP"

      - name: Connection Info & Keep Alive
        run: |
          Write-Host ""
          Write-Host "======================================="
          Write-Host "        RDP LITE — CONNECT NOW"
          Write-Host "======================================="
          Write-Host "  IP       : $env:TS_IP"
          Write-Host "  Username : $env:RDP_USER"
          Write-Host "  Password : $env:RDP_PASS"
          Write-Host "======================================="
          Write-Host ""

          $start = Get-Date
          while ($true) {
              $m = [math]::Round(((Get-Date) - $start).TotalMinutes, 0)
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Up: $([math]::Floor($m/60))h$($m%60)m | Left: ~$(3600-$m)m"
              Start-Sleep -Seconds 300
          }
