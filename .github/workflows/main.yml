          winget install --id Microsoft.DirectX --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          # Fallback: Microsoft Visual C++ Redistributable (required by many DirectX apps)
          winget install --id Microsoft.VCRedist.2015+.x64 --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          Write-Host "DirectX Runtime + VC++ Redistributable installed"
