      - name: Install Microsoft Store
        if: ${{ inputs.install_store == true }}
        continue-on-error: true
        run: |
          Write-Host "=== Enabling Microsoft Store ==="

          # Re-enable Microsoft Store if disabled by policy
          reg delete "HKLM\SOFTWARE\Policies\Microsoft\WindowsStore" /v "RemoveWindowsStore" /f 2>$null
          reg delete "HKLM\SOFTWARE\Policies\Microsoft\WindowsStore" /v "DisableStoreApps" /f 2>$null

          # Re-register Microsoft Store
          Get-AppxPackage -AllUsers Microsoft.WindowsStore 2>$null | ForEach-Object {
              Add-AppxPackage -DisableDevelopmentMode -Register "$($_.InstallLocation)\AppXManifest.xml" -ErrorAction SilentlyContinue
          }

          # If Store is not installed, install it
          $store = Get-AppxPackage -AllUsers Microsoft.WindowsStore -ErrorAction SilentlyContinue
          if (-not $store) {
              Write-Host "  Store not found — installing from scratch..."
              # Install dependencies
              @(
                  "Microsoft.NET.Native.Framework.2.2",
                  "Microsoft.NET.Native.Runtime.2.2",
                  "Microsoft.VCLibs.140.00",
                  "Microsoft.UI.Xaml.2.8"
              ) | ForEach-Object {
                  Get-AppxPackage -AllUsers $_ 2>$null | ForEach-Object {
                      Add-AppxPackage -DisableDevelopmentMode -Register "$($_.InstallLocation)\AppXManifest.xml" -ErrorAction SilentlyContinue
                  }
              }

              # Download and install Store
              $storeUrl = "https://github.com/AveYo/fox/raw/main/store.cmd"
              Invoke-WebRequest -Uri "https://raw.githubusercontent.com/AveYo/fox/main/store.cmd" -OutFile "$env:TEMP\store.cmd" -UseBasicParsing -ErrorAction SilentlyContinue
              if (Test-Path "$env:TEMP\store.cmd") {
                  Start-Process cmd.exe -ArgumentList "/c", "$env:TEMP\store.cmd" -Wait -ErrorAction SilentlyContinue
                  Remove-Item "$env:TEMP\store.cmd" -Force -ErrorAction SilentlyContinue
              }

              # Alternative: wsreset to force re-register
              Start-Process wsreset.exe -Wait -ErrorAction SilentlyContinue
          }

          # Enable Store services
          @("InstallService", "ClipSVC", "LicenseManager") | ForEach-Object {
              Set-Service -Name $_ -StartupType Automatic -ErrorAction SilentlyContinue
              Start-Service -Name $_ -ErrorAction SilentlyContinue
          }

          $storeCheck = Get-AppxPackage -AllUsers Microsoft.WindowsStore -ErrorAction SilentlyContinue
          if ($storeCheck) {
              Write-Host "  Microsoft Store ready: v$($storeCheck.Version)"
          } else {
              Write-Host "  Microsoft Store installation attempted — may need login to activate"
          }

