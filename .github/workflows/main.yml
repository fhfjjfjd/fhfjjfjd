      - name: Install FileZilla + WinSCP
        if: ${{ inputs.install_file_transfer == true }}
        continue-on-error: true
        run: |
          winget install --id TimKosse.FileZilla.Client --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          winget install --id WinSCP.WinSCP --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          Write-Host "FileZilla + WinSCP installed"
          exit 0

      - name: Create RDP User
        run: |
          $username = "${{ inputs.username }}"
          $chars = @()
          $chars += [char[]](65..90)  | Get-Random -Count 5
          $chars += [char[]](97..122) | Get-Random -Count 5
          $chars += [char[]](48..57)  | Get-Random -Count 3
          $chars += ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)) | Get-Random -Count 3
          $password = -join ($chars | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          $existingUser = Get-LocalUser -Name $username -ErrorAction SilentlyContinue
          if ($existingUser) {
              Set-LocalUser -Name $username -Password $securePass
          } else {
              New-LocalUser -Name $username -Password $securePass -PasswordNeverExpires -AccountNeverExpires
          }

          foreach ($group in @("Administrators", "Remote Desktop Users")) {
              $isMember = Get-LocalGroupMember -Group $group -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -like "*\$username" }
              if (-not $isMember) {
                  Add-LocalGroupMember -Group $group -Member $username
              }
          }

          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name $username)) {
              Write-Error "User creation failed!"
              exit 1
          }
          Write-Host "User '$username' ready"

      - name: Install & Connect Tailscale
        run: |
          winget install --id Tailscale.Tailscale --silent --accept-package-agreements --accept-source-agreements

          # Wait for Tailscale service to start
          $maxWait = 30
          for ($i = 0; $i -lt $maxWait; $i++) {
              if (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe") { break }
              Start-Sleep -Seconds 2
          }

          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tailscale)) {
              Write-Error "Tailscale not found after install"
              exit 1
          }

          & $tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp-${{ github.run_id }}

          $tsIP = $null
          for ($i = 0; $i -lt 20; $i++) {
              $tsIP = (& $tailscale ip -4 2>$null) | Select-Object -First 1
              if ($tsIP) { break }
              Start-Sleep -Seconds 3
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned after 60s"
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale connected: $tsIP"

      - name: Verify RDP
        run: |
          $result = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
          if (-not $result.TcpTestSucceeded) {
              Write-Error "RDP port 3389 not reachable on $env:TAILSCALE_IP"
              exit 1
          }
          Write-Host "RDP verified: $env:TAILSCALE_IP`:3389"

      - name: Connection Info & Keep Alive
        run: |
          $border = "=" * 55
          Write-Host ""
          Write-Host $border
          Write-Host "           RDP CONNECTION DETAILS"
          Write-Host $border
          Write-Host ""
          Write-Host "  Address  : $env:TAILSCALE_IP"
          Write-Host "  Username : $env:RDP_USER"
          Write-Host "  Password : $env:RDP_PASS"
          Write-Host ""
          Write-Host $border
          Write-Host "  Started  : $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')"
          Write-Host "  Timeout  : ~3600 minutes (60 hours)"
          Write-Host "  Runner   : $env:RUNNER_NAME"
          Write-Host $border
          Write-Host ""
          Write-Host "  Tip: Use Tailscale IP in your RDP client"
          Write-Host "  Cancel this workflow to terminate the session"
          Write-Host ""

          $startTime = Get-Date
          while ($true) {
              $elapsed = [math]::Round(((Get-Date) - $startTime).TotalMinutes, 0)
              $remaining = 3600 - $elapsed
              $hours = [math]::Floor($elapsed / 60)
              $mins = $elapsed % 60
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Uptime: ${hours}h${mins}m | Remaining: ~${remaining}m"
              Start-Sleep -Seconds 300
          }
