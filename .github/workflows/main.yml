name: RDP

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'RDP Username'
        required: false
        default: 'RDP'
      install_vscode:
        description: 'Install VS Code'
        required: false
        type: boolean
        default: false
      install_nodejs:
        description: 'Install Node.js (LTS)'
        required: false
        type: boolean
        default: false
      install_python:
        description: 'Install Python 3.13'
        required: false
        type: boolean
        default: false
      install_git:
        description: 'Install Git'
        required: false
        type: boolean
        default: false
      install_7zip:
        description: 'Install 7-Zip'
        required: false
        type: boolean
        default: false
      install_notepadpp:
        description: 'Install Notepad++'
        required: false
        type: boolean
        default: false
      install_java:
        description: 'Install Java (JDK 21)'
        required: false
        type: boolean
        default: false
      install_dotnet:
        description: 'Install .NET 8 Runtime'
        required: false
        type: boolean
        default: false
      install_winrar:
        description: 'Install WinRAR'
        required: false
        type: boolean
        default: false
      install_vlc:
        description: 'Install VLC Media Player'
        required: false
        type: boolean
        default: false
      install_firefox:
        description: 'Install Firefox'
        required: false
        type: boolean
        default: false
      install_telegram:
        description: 'Install Telegram Desktop'
        required: false
        type: boolean
        default: false
      install_obs:
        description: 'Install OBS Studio'
        required: false
        type: boolean
        default: false
      install_putty:
        description: 'Install PuTTY (SSH Client)'
        required: false
        type: boolean
        default: false
      install_postman:
        description: 'Install Postman (API Testing)'
        required: false
        type: boolean
        default: false
      install_discord:
        description: 'Install Discord'
        required: false
        type: boolean
        default: false
      install_steam:
        description: 'Install Steam'
        required: false
        type: boolean
        default: false
      install_sublimetext:
        description: 'Install Sublime Text'
        required: false
        type: boolean
        default: false
      install_file_transfer:
        description: 'Install FileZilla + WinSCP'
        required: false
        type: boolean
        default: false
      install_chrome:
        description: 'Install Chrome + Uninstall Edge'
        required: false
        type: boolean
        default: false
      install_wsl:
        description: 'Install WSL2 + Ubuntu'
        required: false
        type: boolean
        default: false
      install_docker:
        description: 'Install Docker Desktop'
        required: false
        type: boolean
        default: false
      install_directx:
        description: 'Install DirectX + VC++ Redistributable'
        required: false
        type: boolean
        default: false
      install_store:
        description: 'Install Microsoft Store'
        required: false
        type: boolean
        default: false

concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: System Info
        run: |
          $border = "=" * 55
          Write-Host $border
          Write-Host "              SYSTEM INFORMATION"
          Write-Host $border
          $os = Get-CimInstance Win32_OperatingSystem
          $cpu = Get-CimInstance Win32_Processor
          $cs = Get-CimInstance Win32_ComputerSystem
          $disk = Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'"
          $gpu = Get-CimInstance Win32_VideoController

          Write-Host "  OS      : $($os.Caption) (Build $($os.BuildNumber))"
          Write-Host "  CPU     : $($cpu.Name)"
          Write-Host "  Cores   : $($cpu.NumberOfCores) cores / $($cpu.NumberOfLogicalProcessors) threads"
          Write-Host "  RAM     : $([math]::Round($cs.TotalPhysicalMemory / 1GB, 1)) GB"
          Write-Host "  Disk C  : $([math]::Round($disk.FreeSpace / 1GB, 1)) GB free / $([math]::Round($disk.Size / 1GB, 1)) GB total"
          $gpu | ForEach-Object {
              Write-Host "  GPU     : $($_.Name) ($([math]::Round($_.AdapterRAM / 1MB, 0)) MB)"
          }
          Write-Host "  Runner  : $env:RUNNER_NAME"
          Write-Host $border

      - name: Boost Performance & Optimize RAM
        run: |
          $ramBefore = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1MB, 1)
          Write-Host "============================================="
          Write-Host "     PERFORMANCE & MEMORY OPTIMIZATION"
          Write-Host "============================================="
          Write-Host "  RAM Free before: ${ramBefore} GB"

          # === Power Plan: High Performance ===
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

          # === Disable Windows Defender completely (save CPU + RAM) ===
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableArchiveScanning $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableScriptScanning $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -MAPSReporting Disabled -ErrorAction SilentlyContinue
          Set-MpPreference -SubmitSamplesConsent 2 -ErrorAction SilentlyContinue
          Stop-Service -Name "WinDefend" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "WinDefend" -StartupType Disabled -ErrorAction SilentlyContinue
          Stop-Service -Name "WdNisSvc" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "WdNisSvc" -StartupType Disabled -ErrorAction SilentlyContinue

          # === Disable ALL unnecessary services (aggressive) ===
          $servicesToDisable = @(
              "DiagTrack",           # Diagnostics Tracking (~30MB)
              "SysMain",             # Superfetch (~50-100MB)
              "WSearch",             # Windows Search Indexing (~40MB)
              "TabletInputService",  # Tablet Input
              "MapsBroker",          # Downloaded Maps Manager
              "lfsvc",               # Geolocation
              "RetailDemo",          # Retail Demo
              "WMPNetworkSvc",       # Windows Media Player Sharing
              "wisvc",               # Windows Insider Service
              "WerSvc",              # Windows Error Reporting (~15MB)
              "wercplsupport",       # Error Reporting Control Panel
              "Fax",                 # Fax Service
              "XblAuthManager",      # Xbox Live Auth
              "XblGameSave",         # Xbox Live Game Save
              "XboxGipSvc",          # Xbox Gamepad
              "XboxNetApiSvc",       # Xbox Networking
              "WbioSrvc",            # Biometric Service
              "TrkWks",              # Distributed Link Tracking (~5MB)
              "dmwappushservice",    # WAP Push Service
              "PhoneSvc",            # Phone Service
              "SEMgrSvc",            # Payments & NFC
              "SCardSvr",            # Smart Card
              "ScDeviceEnum",        # Smart Card Device Enum
              "SCPolicySvc",         # Smart Card Removal Policy
              "SharedAccess",        # Internet Connection Sharing
              "stisvc",              # Still Image Acquisition
              "WPDBusEnum",          # Portable Device Enum
              "WlanSvc",             # WLAN AutoConfig (not needed on server)
              "icssvc",              # Mobile Hotspot
              "NcbService",          # Network Connection Broker
              "Spooler",            # Print Spooler (if no printer)
              "PrintNotify",         # Printer Extensions
              "BITS",                # Background Intelligent Transfer (after updates)
              "wuauserv",            # Windows Update (not needed after setup)
              "DoSvc",               # Delivery Optimization (~20MB)
              "UsoSvc",              # Update Orchestrator
              "TimeBrokerSvc",       # Time Broker
              "TokenBroker",         # Web Authentication Broker
              "CDPSvc",              # Connected Devices Platform
              "CDPUserSvc",          # Connected Devices Platform User
              "PcaSvc",              # Program Compatibility Assistant (~10MB)
              "DPS",                 # Diagnostic Policy Service (~15MB)
              "WdiServiceHost",      # Diagnostic Service Host
              "WdiSystemHost"        # Diagnostic System Host
          )
          foreach ($svc in $servicesToDisable) {
              Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
          }

          # === Kill memory-heavy background processes ===
          $processesToKill = @(
              "SearchIndexer", "SearchHost", "SearchApp",
              "MsMpEng", "NisSrv",
              "OneDrive", "OneDriveSetup",
              "CompatTelRunner", "DeviceCensus",
              "backgroundTaskHost", "RuntimeBroker",
              "YourPhone", "GameBar", "GameBarPresenceWriter",
              "Microsoft.Photos", "SkypeApp", "SkypeBackgroundHost",
              "HxTsr", "HxOutlook", "HxCalendarAppImm"
          )
          foreach ($proc in $processesToKill) {
              Get-Process -Name $proc -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }

          # === Disable visual effects (save GPU RAM) ===
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" `
            /v "VisualFXSetting" /t REG_DWORD /d 2 /f

          # === Disable Game Bar/DVR ===
          reg add "HKCU\Software\Microsoft\GameBar" /v "AutoGameModeEnabled" /t REG_DWORD /d 0 /f
          reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\GameDVR" /v "AllowGameDVR" /t REG_DWORD /d 0 /f

          # === Disable Windows Error Reporting ===
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" `
            /v "Disabled" /t REG_DWORD /d 1 /f

          # === Optimize Virtual Memory / Pagefile ===
          $totalRAM = (Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory
          $pagefileSize = [math]::Round($totalRAM / 1MB * 1.5, 0)
          $pagefileMax = [math]::Round($totalRAM / 1MB * 3, 0)
          $cs = Get-CimInstance Win32_ComputerSystem
          $cs | Set-CimInstance -Property @{AutomaticManagedPagefile=$false} -ErrorAction SilentlyContinue
          $pf = Get-CimInstance Win32_PageFileSetting -ErrorAction SilentlyContinue
          if ($pf) {
              $pf | Set-CimInstance -Property @{InitialSize=$pagefileSize; MaximumSize=$pagefileMax} -ErrorAction SilentlyContinue
          } else {
              New-CimInstance -ClassName Win32_PageFileSetting -Property @{Name="C:\pagefile.sys"; InitialSize=$pagefileSize; MaximumSize=$pagefileMax} -ErrorAction SilentlyContinue
          }
          Write-Host "  Pagefile: ${pagefileSize}MB — ${pagefileMax}MB"

          # === Reduce memory for system cache (prioritize apps) ===
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" `
            /v "LargeSystemCache" /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" `
            /v "DisablePagingExecutive" /t REG_DWORD /d 1 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" `
            /v "ClearPageFileAtShutdown" /t REG_DWORD /d 0 /f

          # === Disable memory compression (use raw RAM) ===
          Disable-MMAgent -MemoryCompression -ErrorAction SilentlyContinue

          # === Disable Prefetch/Superfetch ===
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters" `
            /v "EnablePrefetcher" /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters" `
            /v "EnableSuperfetch" /t REG_DWORD /d 0 /f

          # === Disable Windows Tips/Notifications (background memory) ===
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager" `
            /v "SubscribedContent-338389Enabled" /t REG_DWORD /d 0 /f
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\PushNotifications" `
            /v "ToastEnabled" /t REG_DWORD /d 0 /f

          # === Disable Cortana ===
          reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search" `
            /v "AllowCortana" /t REG_DWORD /d 0 /f

          # === Flush working sets ===
          [System.GC]::Collect()
          [System.GC]::WaitForPendingFinalizers()

          $ramAfter = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1MB, 1)
          $ramSaved = [math]::Round($ramAfter - $ramBefore, 1)
          Write-Host ""
          Write-Host "  RAM Free after:  ${ramAfter} GB (+${ramSaved} GB freed)"
          Write-Host "  Services disabled: $($servicesToDisable.Count)"
          Write-Host "  Processes killed:  $($processesToKill.Count) targets"
          Write-Host "============================================="

      - name: Free Disk Space (Aggressive)
        run: |
          $diskBefore = [math]::Round((Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 1)
          Write-Host "============================================="
          Write-Host "      AGGRESSIVE DISK CLEANUP"
          Write-Host "============================================="
          Write-Host "  Disk Free before: ${diskBefore} GB"

          # === 1. Temp files ===
          Write-Host ""
          Write-Host ">>> [1/7] Cleaning temp files..."
          @(
              "$env:TEMP\*",
              "C:\Users\runneradmin\AppData\Local\Temp\*",
              "C:\Windows\Temp\*",
              "C:\Windows\Prefetch\*",
              "C:\Windows\SoftwareDistribution\Download\*",
              "C:\Windows\Logs\*",
              "C:\Windows\Panther\*",
              "C:\Windows\inf\*.log",
              "C:\Windows\debug\*"
          ) | ForEach-Object {
              Remove-Item -Path $_ -Recurse -Force -ErrorAction SilentlyContinue
          }

          # === 2. Pre-installed tools (GitHub runner bloat) ===
          Write-Host ">>> [2/7] Removing pre-installed bloat..."
          @(
              "C:\ProgramData\Package Cache",
              "C:\Modules",
              "C:\imagegeneration",
              "C:\hostedtoolcache\CodeQL",
              "C:\hostedtoolcache\go",
              "C:\hostedtoolcache\Ruby",
              "C:\hostedtoolcache\Java_Temurin-Hotspot_jdk",
              "C:\hostedtoolcache\PyPy",
              "C:\hostedtoolcache\node",
              "C:\Strawberry",
              "C:\SeleniumWebDrivers",
              "C:\ghcup",
              "C:\mingw64",
              "C:\msys64",
              "C:\tools\php",
              "C:\tools\zstd",
              "C:\tools\kotlinc",
              "C:\Program Files\dotnet\sdk\*preview*",
              "C:\Program Files\MongoDB",
              "C:\Program Files\MySQL",
              "C:\Program Files\PostgreSQL",
              "C:\Program Files\LLVM",
              "C:\Program Files (x86)\Microsoft SDKs\Azure",
              "C:\Program Files (x86)\Microsoft Visual Studio\Installer",
              "C:\ProgramData\Chocolatey",
              "C:\Users\runneradmin\.cargo",
              "C:\Users\runneradmin\.rustup",
              "C:\Users\runneradmin\.dotnet",
              "C:\Users\runneradmin\.nuget",
              "C:\Users\runneradmin\.gradle",
              "C:\Users\runneradmin\.m2",
              "C:\Users\runneradmin\.conda",
              "C:\Users\runneradmin\AppData\Local\pip\cache",
              "C:\Users\runneradmin\AppData\Local\NuGet\v3-cache"
          ) | ForEach-Object {
              if (Test-Path $_) {
                  $size = [math]::Round((Get-ChildItem -Path $_ -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB, 0)
                  Remove-Item -Path $_ -Recurse -Force -ErrorAction SilentlyContinue
                  if ($size -gt 10) { Write-Host "    Removed: $_ (~${size} MB)" }
              }
          }

          # === 3. Remove pre-installed apps (Appx bloat) ===
          Write-Host ">>> [3/7] Removing bloatware Appx packages..."
          @(
              "Microsoft.BingWeather",
              "Microsoft.BingNews",
              "Microsoft.GetHelp",
              "Microsoft.Getstarted",
              "Microsoft.MicrosoftOfficeHub",
              "Microsoft.MicrosoftSolitaireCollection",
              "Microsoft.People",
              "Microsoft.SkypeApp",
              "Microsoft.Xbox*",
              "Microsoft.YourPhone",
              "Microsoft.ZuneMusic",
              "Microsoft.ZuneVideo",
              "Microsoft.MixedReality.Portal",
              "Microsoft.Messaging",
              "Microsoft.OneConnect",
              "Microsoft.Print3D",
              "Microsoft.3DBuilder",
              "Microsoft.WindowsFeedbackHub",
              "Microsoft.WindowsMaps",
              "Microsoft.WindowsCamera",
              "Microsoft.WindowsAlarms",
              "Microsoft.Todos",
              "Clipchamp.Clipchamp",
              "Microsoft.PowerAutomateDesktop",
              "MicrosoftTeams",
              "Microsoft.549981C3F5F10"
          ) | ForEach-Object {
              Get-AppxPackage -AllUsers $_ -ErrorAction SilentlyContinue | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue
              Get-AppxProvisionedPackage -Online -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like $_ } |
                  Remove-AppxProvisionedPackage -Online -ErrorAction SilentlyContinue
          }

          # === 4. Windows component cleanup ===
          Write-Host ">>> [4/7] Windows component cleanup..."
          Dism.exe /online /Cleanup-Image /StartComponentCleanup /ResetBase 2>$null
          Dism.exe /online /Cleanup-Image /SPSuperseded 2>$null

          # === 5. Clear Windows caches ===
          Write-Host ">>> [5/7] Clearing Windows caches..."
          @(
              "C:\Windows\Installer\$PatchCache$",
              "C:\Windows\ServiceProfiles\LocalService\AppData\Local\FontCache",
              "C:\ProgramData\Microsoft\Windows\WER",
              "C:\ProgramData\USOShared\Logs",
              "C:\Users\runneradmin\AppData\Local\CrashDumps",
              "C:\Users\runneradmin\AppData\Local\Microsoft\Windows\INetCache",
              "C:\Users\runneradmin\AppData\Local\Microsoft\Windows\Explorer\thumbcache_*"
          ) | ForEach-Object {
              Remove-Item -Path $_ -Recurse -Force -ErrorAction SilentlyContinue
          }

          # === 6. Disable hibernation (frees ~3-4GB) ===
          Write-Host ">>> [6/7] Disabling hibernation..."
          powercfg /h off

          # === 7. Compact OS (compress Windows files, frees ~2-3GB) ===
          Write-Host ">>> [7/7] Compacting Windows OS..."
          compact /CompactOS:always 2>$null

          # === SUMMARY ===
          $diskAfter = [math]::Round((Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 1)
          $diskSaved = [math]::Round($diskAfter - $diskBefore, 1)
          Write-Host ""
          Write-Host "============================================="
          Write-Host "  Disk Free before: ${diskBefore} GB"
          Write-Host "  Disk Free after:  ${diskAfter} GB"
          Write-Host "  Space recovered:  +${diskSaved} GB"
          Write-Host "============================================="

      - name: Install OpenGL (Mesa3D) & Video Optimization
        continue-on-error: true
        run: |
          Write-Host "============================================="
          Write-Host "     OPENGL + VIDEO OPTIMIZATION"
          Write-Host "============================================="

          # === 1. Install Mesa3D (Software OpenGL for virtual GPU) ===
          Write-Host ""
          Write-Host ">>> [1/4] Installing Mesa3D OpenGL (latest)..."

          # Auto-detect latest Mesa3D version from GitHub API
          $downloaded = $false
          try {
              $releaseInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/pal1000/mesa-dist-win/releases/latest" -UseBasicParsing -ErrorAction Stop
              $mesaVersion = $releaseInfo.tag_name
              $mesaAsset = $releaseInfo.assets | Where-Object { $_.name -match "mesa3d-.*release-msvc\.7z$" } | Select-Object -First 1
              if ($mesaAsset) {
                  Write-Host "  Latest version: $mesaVersion"
                  Invoke-WebRequest -Uri $mesaAsset.browser_download_url -OutFile "$env:TEMP\mesa3d.7z" -UseBasicParsing -ErrorAction Stop
                  $downloaded = $true
                  Write-Host "  Downloaded: $($mesaAsset.name)"
              }
          } catch {
              Write-Host "  GitHub API failed — trying fallback..."
          }

          # Fallback: direct URL
          if (-not $downloaded) {
              try {
                  Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/latest/download/mesa3d-release-msvc.7z" -OutFile "$env:TEMP\mesa3d.7z" -UseBasicParsing -ErrorAction Stop
                  $downloaded = $true
                  Write-Host "  Downloaded Mesa3D from fallback URL"
              } catch {
                  Write-Host "  Fallback also failed"
              }
          }

          if ($downloaded) {
              # Extract Mesa3D
              if (Get-Command 7z -ErrorAction SilentlyContinue) {
                  $extractPath = "$env:TEMP\mesa3d"
                  7z x "$env:TEMP\mesa3d.7z" -o"$extractPath" -y 2>$null

                  # Copy OpenGL DLLs to System32 (64-bit)
                  $dllFiles = @("opengl32.dll", "libgallium_wgl.dll", "libglapi.dll", "osmesa.dll")
                  foreach ($dll in $dllFiles) {
                      $src = Get-ChildItem -Path $extractPath -Filter $dll -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1
                      if ($src) {
                          Copy-Item -Path $src.FullName -Destination "$env:SystemRoot\System32\$dll" -Force -ErrorAction SilentlyContinue
                          Write-Host "  Installed: $dll → System32"
                      }
                  }

                  # Copy 32-bit DLLs to SysWOW64
                  foreach ($dll in $dllFiles) {
                      $src32 = Get-ChildItem -Path $extractPath -Filter $dll -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -match "x86" } | Select-Object -First 1
                      if ($src32) {
                          Copy-Item -Path $src32.FullName -Destination "$env:SystemRoot\SysWOW64\$dll" -Force -ErrorAction SilentlyContinue
                      }
                  }

                  Remove-Item -Path $extractPath -Recurse -Force -ErrorAction SilentlyContinue
                  Write-Host "  Mesa3D OpenGL installed (64-bit + 32-bit)"
              } else {
                  Write-Host "  7z not found — installing 7-Zip first..."
                  winget install --id 7zip.7zip --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
                  $env:PATH += ";C:\Program Files\7-Zip"
                  7z x "$env:TEMP\mesa3d.7z" -o"$env:SystemRoot\System32" -y opengl32.dll 2>$null
                  Write-Host "  Mesa3D OpenGL installed (basic)"
              }
              Remove-Item "$env:TEMP\mesa3d.7z" -Force -ErrorAction SilentlyContinue
          }

          # === 2. OpenGL / DirectX Registry Optimization ===
          Write-Host ""
          Write-Host ">>> [2/4] OpenGL & DirectX registry optimization..."

          # Force WARP software renderer (high quality software GPU)
          reg add "HKLM\SOFTWARE\Microsoft\DirectX" /v "ForceWARP" /t REG_DWORD /d 1 /f

          # Enable OpenGL ICD (Installable Client Driver)
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\OpenGLDrivers\MSOGL" `
            /v "DLL" /t REG_SZ /d "opengl32.dll" /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\OpenGLDrivers\MSOGL" `
            /v "DriverVersion" /t REG_DWORD /d 2 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\OpenGLDrivers\MSOGL" `
            /v "Flags" /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\OpenGLDrivers\MSOGL" `
            /v "Version" /t REG_DWORD /d 2 /f

          # Force GPU scheduling for video
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers" `
            /v "HwSchMode" /t REG_DWORD /d 2 /f

          Write-Host "  OpenGL ICD registered + DirectX WARP enabled"

          # === 3. Video Playback & Streaming Optimization ===
          Write-Host ""
          Write-Host ">>> [3/4] Video playback optimization..."

          # Enable hardware-accelerated video processing
          $tsPolicy = "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          reg add "$tsPolicy" /v "fEnableVirtualizedGraphics" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "AVC444ModePreferred" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "MaxFrameRate" /t REG_DWORD /d 60 /f
          reg add "$tsPolicy" /v "ImageQuality" /t REG_DWORD /d 3 /f

          # RDP video optimized mode
          reg add "$tsPolicy" /v "VideoPlaybackPolicy" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "fEnableVideoPlaybackOptimization" /t REG_DWORD /d 1 /f

          # Enable Media Foundation for hardware decoding
          reg add "HKLM\SOFTWARE\Microsoft\Windows Media Foundation" `
            /v "EnableFrameServerMode" /t REG_DWORD /d 1 /f

          # Optimize DirectShow / Media Foundation pipeline
          reg add "HKCU\Software\Microsoft\DirectX\UserGpuPreferences" `
            /v "DirectXUserGlobalSettings" /t REG_SZ /d "VRROptimizeEnable=0;SwapEffectUpgradeEnable=1;" /f

          # Enable smooth video streaming over RDP
          reg add "$tsPolicy" /v "UseHardwareGpuScheduler" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "bEnumerateHWBeforeSW" /t REG_DWORD /d 0 /f

          # Multimedia scheduling for video priority
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" `
            /v "NetworkThrottlingIndex" /t REG_DWORD /d 0xffffffff /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" `
            /v "SystemResponsiveness" /t REG_DWORD /d 0 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Playback" `
            /v "Priority" /t REG_DWORD /d 6 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Playback" `
            /v "Scheduling Category" /t REG_SZ /d "High" /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Playback" `
            /v "SFIO Priority" /t REG_SZ /d "High" /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Playback" `
            /v "GPU Priority" /t REG_DWORD /d 8 /f

          # Disable network throttling for video streaming
          reg add "HKLM\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters" `
            /v "DisableBandwidthThrottling" /t REG_DWORD /d 1 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters" `
            /v "DisableLargeMtu" /t REG_DWORD /d 0 /f

          Write-Host "  Video playback optimized: 60fps, AVC444, Media Foundation, no network throttling"

          # === 4. Install K-Lite Codec Pack (all video formats) ===
          Write-Host ""
          Write-Host ">>> [4/4] Installing K-Lite Codec Pack..."
          winget install --id CodecGuide.K-LiteCodecPack.Full --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          Write-Host "  K-Lite Codec Pack installed (H.264, H.265, VP9, AV1, AAC, etc.)"

          Write-Host ""
          Write-Host "============================================="
          Write-Host "  OpenGL: Mesa3D software renderer"
          Write-Host "  Video:  60fps, AVC444, K-Lite codecs"
          Write-Host "  Network: Throttling disabled"
          Write-Host "  Multimedia: High priority scheduling"
          Write-Host "============================================="

      - name: Configure RDP
        run: |
          $tsPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          $rdpTcpPath = "$tsPath\WinStations\RDP-Tcp"

          Set-ItemProperty -Path $tsPath -Name "fDenyTSConnections" -Value 0 -Force

          $rdpSettings = @{
              "UserAuthentication"         = 0
              "SecurityLayer"              = 0
              "fDisableAudioRedirection"   = 0
              "fDisableAudioCapture"       = 0
              "AudioCaptureRedirectionMode"= 0
              "MaxConnectionTime"          = 0
              "MaxDisconnectionTime"       = 0
              "MaxIdleTime"                = 0
              "fResetBroken"               = 0
              "fDisableClip"               = 0   # Enable clipboard
              "fDisableCdm"               = 0   # Enable drive redirection
              "fDisableCpm"               = 0   # Enable printer redirection
          }
          foreach ($key in $rdpSettings.Keys) {
              Set-ItemProperty -Path $rdpTcpPath -Name $key -Value $rdpSettings[$key] -Force
          }

          # === RDP latency & compression optimization ===
          $tsPolicy = "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          reg add "$tsPolicy" /v "SelectTransport" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "fEnableVirtualizedGraphics" /t REG_DWORD /d 1 /f

          # Disable RemoteFX compression to prevent memory leak (Server 2025 fix)
          reg add "$tsPolicy" /v "fEnableRemoteFXAdvancedRemoteApp" /t REG_DWORD /d 0 /f

          # Enable H.264/AVC for better encoding
          reg add "$tsPolicy" /v "AVC444ModePreferred" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "AVCHardwareEncodePreferred" /t REG_DWORD /d 1 /f

          # Firewall rule
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force
          Write-Host "RDP configured: clipboard, drives, audio, printer redirected"

      - name: Enable Audio
        run: |
          Set-Service -Name "Audiosrv" -StartupType Automatic
          Start-Service -Name "Audiosrv"
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Write-Host "Audio services enabled"

      - name: Detect GPU & Optimize Display
        run: |
          $tsPolicy = "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"

          # === Detect real GPU ===
          $gpus = Get-CimInstance Win32_VideoController
          $realGPU = $gpus | Where-Object {
              $_.Name -notmatch "Microsoft Basic|Generic|Standard VGA|Remote" -and
              $_.Name -match "NVIDIA|AMD|Radeon|GeForce|RTX|GTX|Quadro|Intel (Arc|Iris|UHD|HD)"
          }

          if ($realGPU) {
              Write-Host "=== REAL GPU DETECTED ==="
              $realGPU | ForEach-Object {
                  Write-Host "  Name : $($_.Name)"
                  Write-Host "  VRAM : $([math]::Round($_.AdapterRAM / 1GB, 1)) GB"
                  Write-Host "  Driver: $($_.DriverVersion)"
              }
              reg add "$tsPolicy" /v "AVCHardwareEncodePreferred" /t REG_DWORD /d 1 /f
              reg add "$tsPolicy" /v "bEnumerateHWBeforeSW" /t REG_DWORD /d 1 /f
              reg add "$tsPolicy" /v "fEnableWddmDriver" /t REG_DWORD /d 1 /f
              reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services\Client" `
                /v "EnableHardwareMode" /t REG_DWORD /d 1 /f
              reg add "$tsPolicy" /v "GraphicsProfile" /t REG_DWORD /d 2 /f
              Write-Host ">>> Using REAL GPU"
          } else {
              Write-Host "=== NO REAL GPU — Using Virtual GPU ==="
              $gpus | ForEach-Object { Write-Host "  Detected: $($_.Name)" }
              reg add "$tsPolicy" /v "fEnableVirtualizedGraphics" /t REG_DWORD /d 1 /f
              reg add "$tsPolicy" /v "AVCHardwareEncodePreferred" /t REG_DWORD /d 0 /f
              reg add "$tsPolicy" /v "bEnumerateHWBeforeSW" /t REG_DWORD /d 0 /f
              reg add "$tsPolicy" /v "fEnableWddmDriver" /t REG_DWORD /d 1 /f
              reg add "$tsPolicy" /v "GraphicsProfile" /t REG_DWORD /d 1 /f
              Write-Host ">>> Using VIRTUAL GPU (software rendering)"
          }

          # === Display Quality ===
          reg add "$tsPolicy" /v "ColorDepth" /t REG_DWORD /d 5 /f
          reg add "$tsPolicy" /v "MaxMonitors" /t REG_DWORD /d 4 /f
          reg add "$tsPolicy" /v "MaxXResolution" /t REG_DWORD /d 3840 /f
          reg add "$tsPolicy" /v "MaxYResolution" /t REG_DWORD /d 2160 /f
          reg add "$tsPolicy" /v "VisualExperiencePolicy" /t REG_DWORD /d 1 /f
          reg add "$tsPolicy" /v "DWMFRAMEINTERVAL" /t REG_DWORD /d 15 /f
          reg add "$tsPolicy" /v "MaxFrameRate" /t REG_DWORD /d 60 /f
          reg add "$tsPolicy" /v "ImageQuality" /t REG_DWORD /d 3 /f

          # === DWM & Desktop Composition ===
          Set-Service -Name "UxSms" -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name "UxSms" -ErrorAction SilentlyContinue
          reg add "HKLM\SOFTWARE\Microsoft\Windows\DWM" /v "EnableHWAcceleration" /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\DWM" /v "Composition" /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\DWM" /v "EnableMachineCheck" /t REG_DWORD /d 0 /f

          # === Force GPU visible in Task Manager ===
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers" `
            /v "DisableVersionMismatchCheck" /t REG_DWORD /d 1 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers" `
            /v "TdrLevel" /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Services\GraphicsPerfSvc" `
            /v "Start" /t REG_DWORD /d 2 /f
          Start-Service -Name "GraphicsPerfSvc" -ErrorAction SilentlyContinue

          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Class\{4d36e968-e325-11ce-bfc1-08002be10318}\0000" `
            /v "EnableCrossAdapterResource" /t REG_DWORD /d 1 /f 2>$null
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Class\{4d36e968-e325-11ce-bfc1-08002be10318}\0000" `
            /v "EnableUlps" /t REG_DWORD /d 0 /f 2>$null

          Write-Host ""
          Write-Host "=== GPU Status ==="
          Get-CimInstance Win32_VideoController | ForEach-Object {
              Write-Host "  [$($_.Status)] $($_.Name) - $([math]::Round($_.AdapterRAM / 1MB, 0)) MB"
          }
          Write-Host "Display: 4K@60fps, 32-bit, GPU in Task Manager"

      - name: Update All Drivers
        continue-on-error: true
        run: |
          Write-Host "============================================="
          Write-Host "         UPDATING ALL DRIVERS"
          Write-Host "============================================="

          # === 1. GPU DRIVERS ===
          Write-Host ""
          Write-Host ">>> [1/4] GPU Drivers"
          $gpus = Get-CimInstance Win32_VideoController

          $nvidia = $gpus | Where-Object { $_.Name -match "NVIDIA|GeForce|RTX|GTX|Quadro|Tesla" }
          $amd = $gpus | Where-Object { $_.Name -match "AMD|Radeon|RX \d" }
          $intel = $gpus | Where-Object { $_.Name -match "Intel.*(Arc|Iris|UHD|HD)" }

          if ($nvidia) {
              Write-Host "  NVIDIA detected — installing driver..."
              winget install --id Nvidia.GeForceExperience --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }
          if ($amd) {
              Write-Host "  AMD detected — installing driver..."
              winget install --id AMD.AMDSoftwareAdrenalinEdition --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }
          if ($intel) {
              Write-Host "  Intel GPU detected — installing driver..."
              winget install --id Intel.GraphicsDriver --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }
          if (-not ($nvidia -or $amd -or $intel)) {
              Write-Host "  Virtual GPU only — enabling WARP software renderer"
              reg add "HKLM\SOFTWARE\Microsoft\DirectX" /v "ForceWARP" /t REG_DWORD /d 1 /f
          }

          # === 2. NETWORK DRIVERS ===
          Write-Host ""
          Write-Host ">>> [2/4] Network Drivers"
          $nics = Get-CimInstance Win32_NetworkAdapter | Where-Object { $_.PhysicalAdapter -eq $true }
          $nics | ForEach-Object { Write-Host "  NIC: $($_.Name) — $($_.MACAddress)" }

          # Intel Network Driver
          $intelNic = $nics | Where-Object { $_.Name -match "Intel" }
          if ($intelNic) {
              Write-Host "  Intel NIC detected — installing driver..."
              winget install --id Intel.EthernetAdapter --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
              winget install --id Intel.WiFiDriver --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }

          # Realtek Network Driver
          $realtekNic = $nics | Where-Object { $_.Name -match "Realtek" }
          if ($realtekNic) {
              Write-Host "  Realtek NIC detected — installing driver..."
              winget install --id Realtek.EthernetController --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }

          # Mellanox / Virtual NIC
          $mellanoxNic = $nics | Where-Object { $_.Name -match "Mellanox|ConnectX" }
          if ($mellanoxNic) {
              Write-Host "  Mellanox NIC detected — virtual adapter, no driver update needed"
          }

          # Hyper-V Network
          $hypervNic = $nics | Where-Object { $_.Name -match "Hyper-V" }
          if ($hypervNic) {
              Write-Host "  Hyper-V virtual NIC detected — using inbox driver"
          }

          if (-not ($intelNic -or $realtekNic -or $mellanoxNic -or $hypervNic)) {
              Write-Host "  No known NIC vendor detected — skipping driver install"
          }

          # === 3. AUDIO / CHIPSET / OTHER ===
          Write-Host ""
          Write-Host ">>> [3/4] Audio & Chipset Drivers"

          # Detect CPU vendor for chipset
          $cpuVendor = (Get-CimInstance Win32_Processor).Manufacturer
          Write-Host "  CPU Vendor: $cpuVendor"

          if ($cpuVendor -match "Intel") {
              Write-Host "  Intel CPU — installing chipset driver..."
              winget install --id Intel.ChipsetINF --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          } elseif ($cpuVendor -match "AMD") {
              Write-Host "  AMD CPU — installing chipset driver..."
              winget install --id AMD.ChipsetSoftware --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
          }

          # Realtek Audio
          $audio = Get-CimInstance Win32_SoundDevice -ErrorAction SilentlyContinue
          if ($audio) {
              $audio | ForEach-Object { Write-Host "  Audio: $($_.Name)" }
              if ($audio | Where-Object { $_.Name -match "Realtek" }) {
                  winget install --id Realtek.RealtekAudioDriver --source winget --silent --accept-package-agreements --accept-source-agreements 2>$null
              }
          } else {
              Write-Host "  No audio device detected (virtual machine)"
          }

          # === 4. WINDOWS UPDATE — ALL REMAINING DRIVERS ===
          Write-Host ""
          Write-Host ">>> [4/4] Windows Update — scanning for all driver updates..."
          try {
              $updateSession = New-Object -ComObject Microsoft.Update.Session
              $searcher = $updateSession.CreateUpdateSearcher()
              $results = $searcher.Search("IsInstalled=0 AND Type='Driver'")

              if ($results.Updates.Count -gt 0) {
                  Write-Host "  Found $($results.Updates.Count) driver update(s):"
                  $results.Updates | ForEach-Object { Write-Host "    - $($_.Title)" }

                  $downloader = $updateSession.CreateUpdateDownloader()
                  $downloader.Updates = $results.Updates
                  $downloader.Download() | Out-Null

                  $installer = New-Object -ComObject Microsoft.Update.Installer
                  $installer.Updates = $results.Updates
                  $installResult = $installer.Install()
                  Write-Host "  Installed! Result code: $($installResult.ResultCode)"
              } else {
                  Write-Host "  All drivers are up to date via Windows Update"
              }
          } catch {
              Write-Host "  Windows Update driver scan skipped: $($_.Exception.Message)"
          }

          # === SUMMARY ===
          Write-Host ""
          Write-Host "============================================="
          Write-Host "         DRIVER STATUS SUMMARY"
          Write-Host "============================================="
          Write-Host "  GPU:"
          Get-CimInstance Win32_VideoController | ForEach-Object {
              Write-Host "    $($_.Name) — v$($_.DriverVersion)"
          }
          Write-Host "  Network:"
          Get-CimInstance Win32_NetworkAdapter | Where-Object { $_.PhysicalAdapter } | ForEach-Object {
              Write-Host "    $($_.Name) — Speed: $($_.Speed)"
          }
          Write-Host "  Audio:"
          Get-CimInstance Win32_SoundDevice -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "    $($_.Name) — $($_.Status)"
          }
          Write-Host "============================================="

      - name: Install WSL2
        if: ${{ inputs.install_wsl == true }}
        continue-on-error: true
        run: |
          try {
              wsl --status 2>&1 | Out-Null
              Write-Host "WSL already installed"
          } catch {
              wsl --install --no-launch
          }
          wsl --update
          wsl --set-default-version 2
          if (-not (wsl -l -q 2>$null | Select-String "Ubuntu")) {
              wsl --install -d Ubuntu --no-launch 2>$null
          }
          wsl --status

      - name: Install Google Chrome
        if: ${{ inputs.install_chrome == true }}
        continue-on-error: true
        run: |
          winget install --id Google.Chrome --silent --accept-package-agreements --accept-source-agreements
          Write-Host "Chrome installed"
          exit 0

      - name: Uninstall Microsoft Edge
        if: ${{ inputs.install_chrome == true }}
        shell: pwsh
        continue-on-error: true
        run: |
          Get-Process -Name "msedge*", "MicrosoftEdge*" -ErrorAction SilentlyContinue | Stop-Process -Force

          $edgePaths = @(
              "${env:ProgramFiles(x86)}\Microsoft\Edge\Application",
              "$env:ProgramFiles\Microsoft\Edge\Application"
          )
          foreach ($basePath in $edgePaths) {
              if (Test-Path $basePath) {
                  Get-ChildItem -Path $basePath -Directory | Where-Object { $_.Name -match '^\d+' } | ForEach-Object {
                      $setup = Join-Path $_.FullName "Installer\setup.exe"
                      if (Test-Path $setup) {
                          Start-Process -FilePath $setup -ArgumentList "--uninstall", "--system-level", "--force-uninstall" -Wait -ErrorAction SilentlyContinue
                      }
                  }
              }
          }

          @(
              "${env:ProgramFiles(x86)}\Microsoft\Edge",
              "$env:ProgramFiles\Microsoft\Edge",
              "${env:ProgramFiles(x86)}\Microsoft\EdgeUpdate",
              "$env:LOCALAPPDATA\Microsoft\Edge"
          ) | ForEach-Object {
              if (Test-Path $_) { Remove-Item -Path $_ -Recurse -Force -ErrorAction SilentlyContinue }
          }

          @(
              "$env:PUBLIC\Desktop\Microsoft Edge.lnk",
              "$env:APPDATA\Microsoft\Internet Explorer\Quick Launch\Microsoft Edge.lnk",
              "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Microsoft Edge.lnk"
          ) | ForEach-Object {
              Remove-Item -Path $_ -Force -ErrorAction SilentlyContinue
          }

          $regPath = "HKLM:\SOFTWARE\Microsoft"
          New-Item -Path "$regPath\EdgeUpdate" -Force | Out-Null
          Set-ItemProperty -Path "$regPath\EdgeUpdate" -Name "DoNotUpdateToEdgeWithChromium" -Value 1 -Type DWord -Force
          Write-Host "Edge removed"

